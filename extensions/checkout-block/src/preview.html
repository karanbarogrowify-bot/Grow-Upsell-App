<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Checkout Block Preview (stub)</title>
    <style>
      body { font-family: Inter, system-ui, Arial; padding: 20px; background: #f7fafc }
      h1 { text-align: center }
      .controls { display:flex; gap:10px; justify-content:center; margin-bottom:16px }
      .upsell-container { max-width: 1000px; margin: 0 auto; }

      /* slider style */
      .slider { display:flex; gap:12px; overflow-x:auto; padding:12px; background:#fff; border-radius:10px; border:1px solid #e5e7eb }
      .card { min-width:200px; background:#fff; border-radius:8px; padding:12px; box-shadow:0 1px 2px rgba(0,0,0,0.04); border:1px solid #e6e6e6 }
      .card h3 { margin:0 0 8px 0; font-size:15px }
      .card p { color:#6b7280; margin:0 0 12px }
      .card .actions { display:flex; gap:8px }
      .btn { padding:8px 10px; border-radius:8px; cursor:pointer; border:0 }
      .btn.add { background:#0f172a; color:#fff }
      .btn.remove { background:#ef4444; color:#fff }

      /* grid overflow */
      .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px }
      .wrap { background:#fff; padding:12px; border-radius:10px; border:1px solid #e5e7eb }
    </style>
  </head>
  <body>
    <div class="upsell-container">
      <h1>Checkout Upsells — Preview</h1>
      <div class="controls">
        <button id="viewSlider" class="btn">Slider view</button>
        <button id="viewGrid" class="btn">Grid view</button>
      </div>

      <section id="sliderSection" class="wrap">
        <div class="slider" id="slider">
          <!-- JS will populate cards -->
        </div>
      </section>

      <section id="gridSection" class="wrap" style="display:none; margin-top:16px">
        <div class="grid" id="grid"></div>
      </section>
    </div>

    <script>
      const upsells = Array.from({length:50}).map((_,i)=>({
        id: `u-${i+1}`,
        title: `Upsell item ${i+1}`,
        price: (99 + (i%10)*5)
      }))

      function makeCard(u){
        const el = document.createElement('div');
        el.className = 'card';
        el.innerHTML = `<h3>${u.title}</h3><p>Price: ₹${u.price}</p><div class='actions'><button class='btn add' data-id='${u.id}'>Add</button><button class='btn remove' data-id='${u.id}'>Remove</button></div>`;
        return el;
      }

      const slider = document.getElementById('slider');
      const grid = document.getElementById('grid');
      upsells.forEach(u=>{ slider.appendChild(makeCard(u)); grid.appendChild(makeCard(u)); });

      document.getElementById('viewSlider').addEventListener('click', ()=>{
        document.getElementById('sliderSection').style.display='block';
        document.getElementById('gridSection').style.display='none';
      });
      document.getElementById('viewGrid').addEventListener('click', ()=>{
        document.getElementById('sliderSection').style.display='none';
        document.getElementById('gridSection').style.display='block';
      });

      // Demo hooks: Add/remove handlers (these should call your extension or backend)
      document.addEventListener('click', async (e)=>{
        if (e.target.matches('.btn.add')){
          const id = e.target.dataset.id;
          console.log('Add', id);
          // call backend API to create checkout / add item in live implementation
        }
        if (e.target.matches('.btn.remove')){
          const id = e.target.dataset.id;
          console.log('Remove', id);
        }
      })
    </script>
  </body>
</html>
